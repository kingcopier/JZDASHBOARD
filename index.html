<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Jared's Project Database</title>
    <meta name="description" content="A curated collection of code, designs, and digital artifacts — Jared's personal project portfolio." />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Open Graph / link previews (Slack, iMessage, LinkedIn, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Jared's Project Database" />
    <meta property="og:description" content="A curated collection of code, designs, and digital artifacts." />
    <!-- Update og:url to your actual domain before deploying -->
    <meta property="og:url" content="https://yoursite.com" />
    <!-- Add an og:image by placing og-image.png in the public/ folder -->
    <!-- <meta property="og:image" content="https://yoursite.com/og-image.png" /> -->

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Jared's Project Database" />
    <meta name="twitter:description" content="A curated collection of code, designs, and digital artifacts." />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
